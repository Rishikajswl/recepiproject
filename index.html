<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepi Project </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        
        <div class="search-container">
            <input
            type="text"
            placeholder="Type A Dish Name Here.."
            id="user-inp"
            />
            <button id="search-btn">Search</button>
        </div>
        <div id="result"></div>
    </div>
    <!-- Script -->
    <script>
        let result = document.getElementById("result");
        let searchBtn = document.getElementById("search-btn");
        let url ="https://dummyjson.com/recipes/search?q=";
        searchBtn.addEventListener("click", () => {
  let userInp = document.getElementById("user-inp").value;
  if (userInp.length == 0) {
    result.innerHTML = `<h3>Input Field Cannot Be Empty</h3>`;
  } else {
    fetch(url + userInp)
      .then((response) => response.json())
      .then((data) => {
        let myMeal = data.recipes[0];
        console.log(myMeal);
        console.log(myMeal.image);
        console.log(myMeal.name);
        console.log(myMeal.cuisine);
        console.log(myMeal.instructions);

        let ingredients = [];
        for (let i in myMeal) {
          let ingredient = "";
          if (i.startsWith("ingredient") && myMeal[i]) {
            ingredient = myMeal[i];
            ingredients.push(`${ingredient}`);
          }
        }
        console.log(ingredients);
        result.innerHTML = `
    <img src=${myMeal.image}>
    <div class="details">
        <h2>${myMeal.name}</h2>
        <h4>${myMeal.cuisine}</h4>
    </div>
    <div id="ingredient-con"></div>
    <div id="recipe">
        <button id="hide-recipe">X</button>
        <pre id="instructions">${myMeal.instructions}</pre>
    </div>
    <button id="show-recipe">View Recipe</button>
    `;
      let ingredientCon = document.getElementById("ingredient-con");
        let parent = document.createElement("ul");
        let recipe = document.getElementById("recipe");
        let hideRecipe = document.getElementById("hide-recipe");
        let showRecipe = document.getElementById("show-recipe");

        ingredients.forEach((i) => {
          let child = document.createElement("li");
          child.innerText = i;
          parent.appendChild(child);
          ingredientCon.appendChild(parent);
        });

        hideRecipe.addEventListener("click", () => {
          recipe.style.display = "none";
        });
        showRecipe.addEventListener("click", () => {
          recipe.style.display = "block";
        });
      })
      .catch(() => {
        result.innerHTML = `<h3>Invalid Input</h3>`;
      });
  }
});
    </script>
  </body>
</html>
</body>
</html>
